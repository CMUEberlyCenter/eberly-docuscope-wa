#
# Main instructions for Tools
#
revision_plan: >
  <p>Aquí están los pasos para revisar y corregir su borrador:</p>
  <ol>
  <li>Comience su revisión examinando las <b>expectativas de contenido</b>, ya que estas forman la base de una retroalimentación de escritura efectiva.</li>
  <li>Una vez evaluado el contenido, examine la <b>estructura global y la lógica</b>, analizando cómo fluyen los argumentos y qué tan efectivamente se conectan las ideas entre las secciones.</li>
  <li>Luego, evalúe el uso de <b>evidencia y estrategias de escritura que generen confianza</b> en los lectores.</li>
  <li>A continuación, pasando a un nivel más detallado, revise la <b>claridad de párrafos y oraciones</b>.</li>
  <li>Finalmente, refine el <b>estilo de escritura y el tono</b> para pulir su trabajo.</li>
  </ol>
  <p>Recuerde enfocarse en las mejoras generales antes de perfeccionar las oraciones y los detalles del lenguaje.</p>

expectations: >
  <p>Verifique si su escritura incluye toda la información que los lectores esperan encontrar en su texto, e incorpore los elementos faltantes antes de abordar otros problemas.</p>
  <p>Abordar primero las brechas de contenido garantiza que su escritura cumpla con las expectativas de los lectores y logre su propósito de manera efectiva.</p>

lines_of_arguments: >
  <p>Evalúe qué tan efectivamente su escritura desarrolla su tesis a través de afirmaciones y evidencia para crear un argumento cohesivo y persuasivo.</p>
  <p>Fortalecer su tesis y alinear las afirmaciones mejora la persuasión y la cohesión de su argumento.</p>

pathos: >
  <p>Revise su comunicación en busca de elementos que generen resonancia emocional (<i>es decir,</i> pathos) y conexiones significativas con su audiencia.</p>
  <p>Refinar los recursos emocionales garantiza que su mensaje llegue al corazón de los lectores mientras mantiene la autenticidad y el compromiso ético.</p>

credibility: >
  <p>Revise su comunicación en busca de elementos que establezcan y mantengan la credibilidad y el carácter ético (<i>es decir,</i> ethos).</p>
  <p>Refinar la credibilidad garantiza que su mensaje lleve el peso de la autoridad mientras demuestra integridad y confiabilidad. El objetivo no es simplemente mostrar credenciales, sino construir una confianza genuina.<p>

prominent_topics: >
  <p>Examine los temas prominentes encontrados en su escritura y evalúe si los desarrolló con suficientes detalles.</p>
  <p>Los temas bien desarrollados atraen a los lectores y dejan una impresión duradera al proporcionar una comprensión clara y perspectivas significativas.</p>

logical_flow: >
  <p>Identifique las interrupciones organizativas que afectan el flujo de lectura y la comprensión, como ideas fuera de orden o conceptos dispersos.</p>
  <p>Un flujo lógico mejorado aumenta la legibilidad y ayuda a los lectores a comprender mejor su texto.</p>

term_matrix: >
  <p>Observe cómo se organizan términos específicos a lo largo de su borrador.</p>
  <p>Utilice la visualización interactiva para explorar las conexiones y la ubicación de los términos importantes.</p>
  <p>Refinar la estructura y el flujo de ideas garantiza una mayor cohesión en su escritura.</p>

sources: >
  <p>Revise los problemas asociados con la forma en que se citan las fuentes. Además, verifique si la credibilidad de las fuentes se asigna de manera apropiada revisando cómo se utiliza cada fuente en su borrador.</p>
  <p>Integrar las fuentes de manera adecuada fortalece la credibilidad y el respaldo de su texto.</p>

professional_tone: >
  <p>Revise las oraciones con características lingüísticas que puedan restar adecuación al tono.</p>
  <p>Refinar el tono garantiza que su escritura cumpla con los estándares de los contextos académicos y profesionales.</p>

civil_tone: >
  <p>Revise su comunicación en busca de características lingüísticas que mantengan un discurso respetuoso, constructivo y equilibrado.</p>
  <p>Refinar el tono garantiza que su mensaje promueva la comprensión y el diálogo colaborativo mientras respeta las diversas perspectivas.</p>

clarity: >
  <p>Revise las oraciones con muchas frases nominales, ya que estas oraciones más largas con estructuras potencialmente complejas pueden reducir la legibilidad.</p>
  <p>Mejorar la claridad de las oraciones aumenta la legibilidad y garantiza que sus ideas se comuniquen de manera efectiva.</p>

sentence_density: >
  <p>Identifique las oraciones que pueden ser difíciles de leer utilizando la visualización. Concéntrese en las oraciones con muchas frases nominales y revíselas según sea necesario.</p>
  <p>Mejorar la claridad de las oraciones aumenta la legibilidad y garantiza que sus ideas se comuniquen de manera efectiva.</p>

paragraph_clarity: >
  <p>Revise sus párrafos con problemas de fluidez.</p>
  <p>Mejorar la fluidez dentro de cada párrafo aumenta la legibilidad y garantiza que sus ideas se comuniquen de manera efectiva.</p>


#
# Instructions for Review Insights within each Review Tool
#
lines_of_arguments_insights: >
  Verifique cómo su texto desarrolla su argumento.

credibility_insights: >
  Verifique cómo su texto establece credibilidad.

pathos_insights: >
  Verifique cómo su texto utiliza el recurso emocional (pathos).

prominent_topics_insights: >
  Verifique qué temas son prominentes en su texto y cómo se desarrollan.

logical_flow_insights: >
  Verifique posibles problemas de fluidez entre párrafos.

sources_insights: >
  Verifique cómo su texto utiliza las fuentes.

professional_tone_insights: >
  Verifique si hay problemas de tono profesional.

civil_tone_insights: >
  Verifique si hay lenguaje irrespetuoso.

paragraph_clarity_insights: >
  Verifique si hay párrafos con problemas de fluidez.

sentence_density_insights: >
  Verifique si hay oraciones que puedan ser difíciles de leer.

