  description: El Panel de Coherencia representa el flujo de sus grupos temáticos
    a lo largo y dentro de los párrafos. Los círculos oscuros indican que un grupo
    temático particular se trata de manera prominente en un párrafo determinado. Los
    círculos blancos y los espacios vacíos indican que un grupo temático particular
    se menciona pero no de manera prominente, o no se menciona en absoluto en el párrafo.
    Estudie la visualización en busca de círculos oscuros/blancos y espacios vacíos,
    y verifique si los cambios en los grupos temáticos y su prominencia se ajustan
    a un plan de escritura que sus lectores puedan seguir fácilmente.
