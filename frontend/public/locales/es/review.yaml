    description: Este panel muestra cada una de sus oraciones como una secuencia de
      sintagmas nominales que aparecen antes y después del verbo principal. Preste
      atención a las oraciones con muchos sintagmas nominales antes del verbo principal
      y también después. Haga clic en la línea de la oración a la izquierda para
      ver su oración real.
    read_aloud: Lea la oración en voz alta cuando lo sienta necesario. Si tropieza
      o se queda sin aliento, es muy probable que esté incluyendo demasiada información
      en una sola oración.
    passive: No hay nada de malo en usar <b>verbos copulativos</b> para indicar "existencia".
      Sin embargo, depender en exceso de los <b>verbos copulativos</b> puede resultar
      en una escritura débil. Si considera que tiene demasiados <b>verbos copulativos</b>,
      intente revisar algunas de las oraciones con <b>verbos activos</b>.
